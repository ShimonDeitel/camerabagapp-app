name: Camerabag
options:
  bundleIdPrefix: com.shimondeitel.camerabagapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Camerabag:
    type: application
    platform: iOS
    sources:
      - path: Camerabag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.camerabagapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Camerabag/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CamerabagTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CamerabagTests
      - path: Camerabag.storekit
    dependencies:
      - target: Camerabag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.camerabagapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CamerabagUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CamerabagUITests
    dependencies:
      - target: Camerabag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.camerabagapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Camerabag:
    build:
      targets:
        Camerabag: all
        CamerabagTests: [test]
        CamerabagUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Camerabag.storekit
    test:
      config: Debug
      storeKitConfiguration: Camerabag.storekit
      targets:
        - CamerabagTests
        - CamerabagUITests
    archive:
      config: Release
